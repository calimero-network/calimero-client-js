description: E2E test workflow for calimero-client-js
name: E2E Test Workflow

# Force pull Docker images even if they exist locally
force_pull_image: true
auth_service: true

nodes:
  chain_id: testnet-1
  count: 1
  image: ghcr.io/calimero-network/merod:edge
  prefix: calimero-node
  base_port: 9000
  base_rpc_port: 9100

steps:
  # Step 1: Install the KV store application
  - name: Install KV Store Application
    type: install_application
    node: calimero-node-1
    path: logic/res/kv_store.wasm
    dev: true
    outputs:
      app_id: applicationId

  # Step 2: Create a context using the installed application
  - name: Create Context
    type: create_context
    node: calimero-node-1
    application_id: '{{app_id}}'
    outputs:
      context_id: contextId
      member_public_key: memberPublicKey

# Configuration options
stop_all_nodes: false # Keep nodes running for Playwright tests
restart: true
nuke: false # Don't nuke - let cleanup script handle it
wait_timeout: 60
